name: CI - Build macOS Name: CI - macOS & Windows erstellen auf: workflow_dispatch: push: Tags: ['v*. . '] Windows

Jobs: build-macos: Läuft auf: macos-latest Schritte: - Name: Auschecken verwendet: actions/checkout@v4 - Name: Qt installieren verwendet: jurplel/install-qt-action@v2 mit: Version: '6.10.2' Host: mac Architektur: 'arm64' Module: qtbase qttools - Name: Konfigurieren & Erstellen Ausführen: | mkdir -p build && cd build cmake .. -DCMAKE_BUILD_TYPE=Release cmake --build . --config Release --parallel - Name: macdeployqt und DMG erstellen Ausführen: | APP=$(find build -name "*.app" -maxdepth 3 | head -n1) if [ -z "$APP" ]; then echo "Keine .app gefunden"; exit 1; fi /Users/runner/Qt/6.10.2/macos/bin/macdeployqt "$APP" -dmg ls -la

  build-windows: runs-on: windows-latest steps: - name: Checkout uses: actions/checkout@v4 - name: Install Qt (MinGW) uses: jurplel/install-qt-action@v2 with: version: '6.10.2' host: windows arch: '64' modules: qtbase qttools - name: Setup MSYS2 uses: msys2/setup-msys2@v2 with: msystem: MINGW64 update: true - name: Install mingw shell: msys2 {0} run: | pacman -S --noconfirm mingw-w64-x86_64-toolchain mingw-w64-x86_64-cmake - name: Configure & build shell: msys2 {0} run: | mkdir -p build && cd build cmake .. -G "MinGW Makefiles" -DCMAKE_BUILD_TYPE=Release cmake --build . --config Release --parallel - name: Run windeployqt and create ZIP env: QTDIR: ${{ env.QT_INSTALL_DIR }} run: | cd build || exit 1 if [ -d Release ]; then cd Release; fi for %%f in (*.exe) do set EXE=%%f "%QTDIR%\bin\windeployqt.exe" "%EXE%" powershell -Command "Compress-Archive -Path * -DestinationPath ../Ledeu-Programm-windows.zip" - name: Upload windows artifact uses: actions/upload-artifact@v4 with: name: Ledeu-Programm-windows path: build/Ledeu-Programm-windows.zip
